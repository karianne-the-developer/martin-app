<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Martins dag">
<title>Martins dag 🐻</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, #fff9f0 0%, #f0f7ff 100%);
    min-height: 100vh;
    padding: 16px 12px 40px;
    color: #2a2a4a;
  }
  .app { max-width: 600px; margin: 0 auto; }

  /* HEADER */
  .header { text-align: center; padding: 20px 0 16px; }
  .header-bear { font-size: 90px; display: block; animation: bounce 2s infinite; line-height: 1; margin-bottom: 8px; }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  .header-name { font-size: 48px; font-weight: 900; color: #ff6b35; }
  .header-day { font-size: 26px; font-weight: 700; color: #aaa; margin-top: 4px; }

  /* CARDS */
  .card { background: white; border-radius: 28px; padding: 22px 20px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  .card-title { font-size: 28px; font-weight: 900; color: #2a2a4a; margin-bottom: 16px; text-align: center; }

  /* WEATHER CARD */
  .weather-card { background: linear-gradient(135deg, #74b9ff, #0984e3); }
  .weather-card .card-title { color: white; }
  .weather-top { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 16px; }
  .weather-temp { font-size: 80px; font-weight: 900; color: white; line-height: 1; }
  .weather-icon-big { font-size: 90px; line-height: 1; }

  /* CLOTHING VISUAL */
  .clothes-box { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 16px; }
  .clothes-label { font-size: 24px; font-weight: 900; color: white; text-align: center; margin-bottom: 14px; }
  .clothes-items { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
  .clothes-item {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,0.25); border-radius: 16px;
    padding: 12px 14px; min-width: 82px;
  }
  .clothes-emoji { font-size: 52px; line-height: 1; margin-bottom: 6px; }
  .clothes-name { font-size: 17px; font-weight: 900; color: white; text-align: center; }

  /* TODAY CARD */
  .today-card { background: linear-gradient(135deg, #fd79a8, #e84393); }
  .today-card .card-title { color: white; }
  .today-content { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; text-align: center; }
  .today-emoji { font-size: 90px; display: block; margin-bottom: 12px; }
  .today-text { font-size: 30px; font-weight: 900; color: white; line-height: 1.3; }
  .today-sub { font-size: 22px; font-weight: 700; color: rgba(255,255,255,0.85); margin-top: 10px; line-height: 1.3; }

  /* LETTER OF THE DAY */
  .letter-card { background: linear-gradient(135deg, #fd9644, #e55039); }
  .letter-card .card-title { color: white; }
  .letter-inner { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .letter-big {
    font-size: 140px; font-weight: 900; color: white; line-height: 1;
    text-shadow: 0 6px 0 rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.2); border-radius: 24px;
    width: 100%; text-align: center; padding: 10px 0;
  }
  .letter-words { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; width: 100%; }
  .letter-word {
    background: rgba(255,255,255,0.25); border-radius: 16px;
    padding: 10px 16px; text-align: center;
  }
  .letter-word-emoji { font-size: 44px; display: block; margin-bottom: 4px; }
  .letter-word-text { font-size: 20px; font-weight: 900; color: white; }
  .big-btn {
    display: block; width: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 22px; font-weight: 900;
    padding: 16px; border-radius: 20px;
    border: none; cursor: pointer; margin-top: 12px;
    color: white; background: rgba(255,255,255,0.3);
    transition: transform 0.1s;
  }
  .big-btn:active { transform: scale(0.96); }

  /* SONG CARD */
  .song-card { background: linear-gradient(135deg, #a29bfe, #6c5ce7); }
  .song-card .card-title { color: white; }
  .song-inner { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 4px; }
  .song-notes { font-size: 60px; margin-bottom: 10px; }
  .song-name { font-size: 32px; font-weight: 900; color: white; margin-bottom: 4px; }
  .song-author { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.8); }
  .youtube-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; background: #ff0000;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 22px; font-weight: 900;
    padding: 16px; border-radius: 20px;
    border: none; cursor: pointer; margin-top: 12px;
    color: white; text-decoration: none;
    transition: transform 0.1s;
  }
  .youtube-btn:active { transform: scale(0.96); }
  .yt-icon { font-size: 28px; }

  .footer { text-align: center; padding: 16px 0 8px; font-size: 16px; color: #ccc; font-weight: 700; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <span class="header-bear">🐻</span>
    <div class="header-name" id="greeting">Hei, Martin!</div>
    <div class="header-day" id="dayStr"></div>
  </div>

  <!-- WEATHER + CLOTHES -->
  <div class="card weather-card">
    <div class="card-title">☁️ Ute i dag</div>
    <div class="weather-top">
      <div class="weather-temp" id="tempVal">—°</div>
      <div class="weather-icon-big" id="weatherIcon">⏳</div>
    </div>
    <div class="clothes-box">
      <div class="clothes-label" id="clothesLabel">Henter vær...</div>
      <div class="clothes-items" id="clothesItems"></div>
    </div>
  </div>

  <!-- TODAY IN KINDERGARTEN -->
  <div class="card today-card">
    <div class="card-title">I dag i barnehagen</div>
    <div class="today-content" id="todayContent">
      <span class="today-emoji">⏳</span>
      <div class="today-text">Laster...</div>
    </div>
  </div>

  <!-- LETTER OF THE DAY -->
  <div class="card letter-card">
    <div class="card-title">Dagens bokstav</div>
    <div class="letter-inner">
      <div class="letter-big" id="letterBig">A</div>
    </div>
    <button class="big-btn" onclick="nextLetter()">Neste bokstav! 🔤</button>
  </div>

  <!-- SONG OF THE MONTH -->
  <div class="card song-card">
    <div class="card-title">🎵 Månedssang</div>
    <div class="song-inner">
      <div class="song-notes">🎶🐦🎶</div>
      <div class="song-name" id="songName">Fuglevise</div>
      <div class="song-author" id="songAuthor">Thorbjørn Egner</div>
    </div>
    <a class="youtube-btn" id="youtubeBtn" href="#" target="_blank" rel="noopener">
      <span class="yt-icon">▶️</span> Se og hør på YouTube!
    </a>
  </div>

  <div class="footer">Laget med ❤️ for Martin 🐻</div>
</div>

<script>
// DATE
const today = new Date();
const dayNo = ['Søndag','Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag'];
const monthNo = ['januar','februar','mars','april','mai','juni','juli','august','september','oktober','november','desember'];
const h = today.getHours();
const greet = h < 10 ? 'God morgen, Martin! ☀️' : h < 14 ? 'Hei, Martin! 🌞' : 'God ettermiddag, Martin! 🌤️';
document.getElementById('greeting').textContent = greet;
document.getElementById('dayStr').textContent = dayNo[today.getDay()] + ' ' + today.getDate() + '. ' + monthNo[today.getMonth()];

// SONG – byt ut tittel og artist her når månedssangen endres
const song = {
  title: 'Fuglevise',
  artist: 'Thorbjørn Egner',
};
document.getElementById('songName').textContent = song.title;
document.getElementById('songAuthor').textContent = song.artist;
const ytQuery = encodeURIComponent(song.title + ' ' + song.artist + ' barnehage');
document.getElementById('youtubeBtn').href = 'https://www.youtube.com/results?search_query=' + ytQuery;

// CLOTHING PROFILES
const clothingProfiles = {
  sunny_warm: {
    label: 'Varmt og fint! 😎',
    items: [
      {e:'👕', n:'T-skjorte'},
      {e:'🩳', n:'Shorts'},
      {e:'👟', n:'Sko'},
      {e:'🕶️', n:'Solbriller'},
      {e:'🧴', n:'Solkrem'},
    ]
  },
  mild: {
    label: 'Passe ute! 🌤️',
    items: [
      {e:'👕', n:'T-skjorte'},
      {e:'👖', n:'Bukse'},
      {e:'🧥', n:'Tynn jakke'},
      {e:'👟', n:'Sko'},
    ]
  },
  cold: {
    label: 'Kaldt – kle på deg! 🧤',
    items: [
      {e:'🧣', n:'Ullundertøy'},
      {e:'👖', n:'Bukse'},
      {e:'🦺', n:'Tynn dress'},
      {e:'🧢', n:'Lue'},
      {e:'🧤', n:'Votter'},
    ]
  },
  very_cold: {
    label: 'Veldig kaldt! 🥶',
    items: [
      {e:'🧣', n:'Ullundertøy'},
      {e:'🎿', n:'Vinterdress'},
      {e:'🧢', n:'Lue'},
      {e:'🧤', n:'Votter'},
      {e:'👢', n:'Vinterstøvler'},
    ]
  },
  rain: {
    label: 'Det regner! ☂️',
    items: [
      {e:'🧥', n:'Regnjakke'},
      {e:'👖', n:'Regnbukse'},
      {e:'👢', n:'Gummistøvler'},
    ]
  },
  snow: {
    label: 'Det snør! ❄️',
    items: [
      {e:'🧣', n:'Ullundertøy'},
      {e:'🎿', n:'Vinterdress'},
      {e:'🧢', n:'Lue'},
      {e:'🧤', n:'Votter'},
      {e:'👢', n:'Vinterstøvler'},
    ]
  },
};

function getClothingProfile(temp, wc) {
  if (wc >= 71 && wc <= 77) return 'snow';
  if (temp <= 2 && wc < 51) return 'very_cold';
  if (wc >= 51 && wc <= 67) return 'rain';
  if (temp < 0) return 'very_cold';
  if (temp < 8) return 'cold';
  if (temp < 15) return 'mild';
  return 'sunny_warm';
}

function renderClothes(profileKey) {
  const p = clothingProfiles[profileKey];
  document.getElementById('clothesLabel').textContent = p.label;
  document.getElementById('clothesItems').innerHTML = p.items.map(item =>
    `<div class="clothes-item">
      <div class="clothes-emoji">${item.e}</div>
      <div class="clothes-name">${item.n}</div>
    </div>`
  ).join('');
}

async function fetchWeather() {
  try {
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 8000);
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=59.9&longitude=10.63&current=temperature_2m,weather_code&timezone=Europe%2FOslo', {signal: controller.signal});
    clearTimeout(timeout);
    const d = await r.json();
    const c = d.current;
    const temp = Math.round(c.temperature_2m);
    const wc = c.weather_code;
    document.getElementById('tempVal').textContent = temp + '°';
    let icon = '☀️';
    if (wc === 0) icon = '☀️';
    else if (wc <= 2) icon = '🌤️';
    else if (wc <= 3) icon = '☁️';
    else if (wc <= 48) icon = '🌫️';
    else if (wc <= 57) icon = '🌦️';
    else if (wc <= 67) icon = '🌧️';
    else if (wc <= 77) icon = '❄️';
    else if (wc <= 82) icon = '🌦️';
    else icon = '⛈️';
    document.getElementById('weatherIcon').textContent = icon;
    renderClothes(getClothingProfile(temp, wc));
  } catch(e) {
    document.getElementById('tempVal').textContent = '?°';
    document.getElementById('weatherIcon').textContent = '🌡️';
    document.getElementById('clothesLabel').textContent = 'Sjekk yr.no for vær!';
    document.getElementById('clothesItems').innerHTML = '';
  }
}
fetchWeather();

// TODAY IN KINDERGARTEN – Kr. Robin gruppe, April 2026
const bhgPlan = [
  // Uke 15
  {date:6,  e:'😴', t:'Påskeferie!', sub:'Barnehagen er stengt i dag'},
  {date:7,  e:'🌿', t:'Ute i dag!', sub:'Kr. Robin er ute 🎂 Vi feirer 6-årsdag!'},
  {date:8,  e:'🏠', t:'Inne i dag!', sub:'Vi leker inne og har språkgruppe'},
  {date:9,  e:'🏠', t:'Inne i dag!', sub:'Vi leker inne 🐟 Varm mat: Ovnsbakt torsk!'},
  {date:10, e:'🏠', t:'Inne i dag!', sub:'Kr. Robin inne 🍰 Kakesalg kl. 15!'},
  // Uke 16
  {date:13, e:'🌿', t:'Ute i dag!', sub:'Vi leker ute og tegner og maler 🎨'},
  {date:14, e:'🏠', t:'Inne i dag!', sub:'Gruppedag – Kr. Robin er inne'},
  {date:15, e:'🌿', t:'Ute i dag!', sub:'Vi leker ute og har språkgruppe'},
  {date:16, e:'🔥', t:'Turdag!', sub:'Bål i skogen! Ta med mat og varm drikke 🌲'},
  {date:17, e:'🏠', t:'Inne i dag!', sub:'Gruppedag – Kr. Robin er inne'},
  // Uke 17
  {date:20, e:'🏠', t:'Inne i dag!', sub:'Sosialkompetansesamling og språkgruppe'},
  {date:21, e:'🌿', t:'Ute i dag!', sub:'Gruppedag – Kr. Robin er ute'},
  {date:22, e:'🏠', t:'Inne i dag!', sub:'Møtedag – vi leker inne'},
  {date:23, e:'🎂', t:'Bursdagsfeiring!', sub:'Vi feirer bursdag! 🍅 Tomatsuppe til lunsj'},
  {date:24, e:'🏠', t:'Inne i dag!', sub:'Vi leker inne'},
  // Uke 18
  {date:27, e:'🌿', t:'Ute i dag!', sub:'Vi leker ute og har språkgruppe'},
  {date:28, e:'🌿', t:'Ute i dag!', sub:'Gruppedag – Kr. Robin er ute'},
  {date:29, e:'🌿', t:'Ute i dag!', sub:'Møtedag – vi leker ute'},
  {date:30, e:'🧤', t:'Rusken-dag!', sub:'Alle leveres ute 🧹 Husk arbeidshansker!'},
];

function renderToday() {
  const td = today.getDate();
  const dow = today.getDay();
  const el = document.getElementById('todayContent');
  if (dow === 0 || dow === 6) {
    el.innerHTML = `<span class="today-emoji">🛋️</span><div class="today-text">Helg!</div><div class="today-sub">Ingen barnehage i dag 🥳</div>`;
    return;
  }
  const row = bhgPlan.find(d => d.date === td);
  if (row) {
    el.innerHTML = `<span class="today-emoji">${row.e}</span><div class="today-text">${row.t}</div><div class="today-sub">${row.sub}</div>`;
  } else {
    el.innerHTML = `<span class="today-emoji">🐻</span><div class="today-text">Ha en fin dag!</div><div class="today-sub">Vi sees i barnehagen!</div>`;
  }
}
renderToday();

// LETTER OF THE DAY
const letters = ['A','B','C','D','E','F','G','H','I','J','K','L','M','N','O','P','R','S','T','U','V','W','X','Y','Z','Æ','Ø','Å'];

// Pick letter based on day of year so it changes daily
const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 864e5);
let lIdx = dayOfYear % letters.length;

function showLetter() {
  document.getElementById('letterBig').textContent = letters[lIdx];
}
function nextLetter() { lIdx = (lIdx + 1) % letters.length; showLetter(); }
showLetter();
</script>
</body>
</html>
